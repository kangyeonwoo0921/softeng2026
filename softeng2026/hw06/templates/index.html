<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>구구단 출력기</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
    <h1>구구단 출력하기 </h1>
    <section>
        <form id="form_id" action="javascript:post_query()">
            <label>단: <input type="number" name="dan" min="1" max="20" required></label>
            <button type="submit">출력</button>
        </form>
    </section>

    <div id="results"></div>

    <script>
        function post_query() {
            $.ajax({
                type: "GET",
                url: "/gugudan",
                data: $("#form_id").serialize(),
                success: update_result,
                dataType: "html"
            });
        }

        function update_result(data) {
            $("#results").html(data); 
        }
    </script>
</body>
</html>
